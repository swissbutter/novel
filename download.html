<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Writer | 명조 없는 고딕 에디터</title>
    <style>
        /* [오프라인 전용] 시스템 고딕 폰트 최적화 */
        :root {
            --bg: #f8fafc;
            --paper: #ffffff;
            --text: #1e293b;
            --muted: #64748b;
            --point: #6366f1;
            --border: #e2e8f0;
            --font-size: 1.05rem;
        }

        .dark {
            --bg: #0f172a;
            --paper: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --point: #818cf8;
            --border: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            /* 프리텐다드/본고딕 스타일의 시스템 폰트 스택 */
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 상단 진행 바 (5,000자 목표) */
        .progress-bar {
            position: fixed;
            top: 0; left: 0;
            height: 4px;
            width: 0%;
            background: linear-gradient(to right, var(--point), #a855f7);
            z-index: 1000;
            transition: width 0.3s;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 60px 20px 140px;
        }

        /* 글쓰기 영역 (Paper) */
        .paper {
            background-color: var(--paper);
            padding: 50px 60px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
            border: 1px solid var(--border);
            min-height: 700px;
        }

        input, textarea {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: inherit;
            font-family: inherit;
            resize: none;
        }

        #title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
        }

        .divider {
            height: 2px;
            width: 30px;
            background-color: var(--point);
            margin-bottom: 2.5rem;
            border-radius: 10px;
        }

        #content {
            font-size: var(--font-size);
            line-height: 1.9;
            min-height: 500px;
        }

        /* 하단 컨트롤 바 */
        footer {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 740px;
            background-color: var(--paper);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            z-index: 100;
        }

        .btns { display: flex; gap: 8px; align-items: center; }

        .btn {
            background: transparent;
            border: none;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            color: var(--muted);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: rgba(99, 102, 241, 0.1);
            color: var(--point);
        }

        /* 강조 버튼 (다운로드) */
        .btn-main {
            background-color: var(--point);
            color: white !important;
        }
        .btn-main:hover {
            filter: brightness(1.1);
        }

        .v-line { width: 1px; height: 14px; background: var(--border); margin: 0 4px; }

        .info {
            font-size: 12px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        #char-count { color: var(--point); }
    </style>
</head>
<body>

    <div id="prog" class="progress-bar"></div>

    <main class="container">
        <div class="paper">
            <input type="text" id="title" placeholder="제목을 입력하세요" autocomplete="off">
            <div class="divider"></div>
            <textarea id="content" placeholder="이곳에 당신의 세계를 기록하세요..." spellcheck="false"></textarea>
        </div>
    </main>

    <footer>
        <div class="btns">
            <!-- 요청하신 다운로드 버튼 -->
            <button onclick="save()" class="btn btn-main">다운로드 (.txt)</button>
            <label class="btn" style="cursor:pointer">
                불러오기
                <input type="file" accept=".txt" onchange="load(event)" style="display:none">
            </label>
            <button onclick="toggle()" class="btn">테마</button>
            <div class="v-line"></div>
            <button onclick="zoom(-0.05)" class="btn">A-</button>
            <button onclick="zoom(0.05)" class="btn">A+</button>
        </div>

        <div class="info">
            <span id="char-count">0</span> / 5,000자
        </div>
    </footer>

    <script>
        const content = document.getElementById('content');
        const title = document.getElementById('title');
        const prog = document.getElementById('prog');
        const charCount = document.getElementById('char-count');
        const root = document.documentElement;

        let fontSize = parseFloat(localStorage.getItem('zen_fs')) || 1.05;

        function zoom(n) {
            fontSize = Math.max(0.8, Math.min(1.8, fontSize + n));
            root.style.setProperty('--font-size', fontSize + 'rem');
            localStorage.setItem('zen_fs', fontSize);
            update();
        }

        function update() {
            const val = content.value;
            const len = val.length;
            
            charCount.innerText = len.toLocaleString();
            prog.style.width = Math.min((len / 5000) * 100, 100) + '%';

            content.style.height = 'auto';
            content.style.height = content.scrollHeight + 'px';

            localStorage.setItem('zen_title', title.value);
            localStorage.setItem('zen_content', val);
        }

        content.addEventListener('input', update);
        title.addEventListener('input', update);

        function save() {
            if(!content.value) return alert('내용이 없습니다.');
            const blob = new Blob([content.value], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${title.value || '무제'}.txt`;
            a.click();
        }

        function load(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                content.value = ev.target.result;
                title.value = file.name.replace('.txt', '');
                update();
            };
            reader.readAsText(file);
        }

        function toggle() {
            document.body.classList.toggle('dark');
            localStorage.setItem('zen_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        }

        window.onload = () => {
            title.value = localStorage.getItem('zen_title') || '';
            content.value = localStorage.getItem('zen_content') || '';
            if(localStorage.getItem('zen_theme') === 'dark') document.body.classList.add('dark');
            root.style.setProperty('--font-size', fontSize + 'rem');
            update();
        };
    </script>
</body>
</html>
